<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenToad AI 助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    
    #opentoad-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999999;
    }
    
    #opentoad-toggle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    #opentoad-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    #opentoad-chat {
      position: absolute;
      bottom: 80px;
      right: 0;
      width: 380px;
      height: 500px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    #opentoad-chat.hidden { display: none; }
    
    #opentoad-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #f8f9fa;
    }
    
    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      line-height: 1.5;
    }
    
    .message.user {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    
    .message.assistant {
      background: white;
      color: #333;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    
    #opentoad-input-container {
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }
    
    #opentoad-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      outline: none;
      font-size: 14px;
    }
    
    #opentoad-input:focus {
      border-color: #667eea;
    }
    
    #opentoad-send {
      padding: 10px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    
    #opentoad-send:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="opentoad-widget">
    <div id="opentoad-chat" class="hidden">
      <div id="opentoad-messages">
        <div class="message assistant">你好！我是 OpenToad AI 助手，有什么可以帮助你的吗？</div>
      </div>
      <div id="opentoad-input-container">
        <input id="opentoad-input" type="text" placeholder="发送消息..." />
        <button id="opentoad-send">发送</button>
      </div>
    </div>
    <button id="opentoad-toggle">🤖</button>
  </div>

  <script>
    (function() {
      const toggle = document.getElementById('opentoad-toggle');
      const chat = document.getElementById('opentoad-chat');
      const input = document.getElementById('opentoad-input');
      const sendBtn = document.getElementById('opentoad-send');
      const messages = document.getElementById('opentoad-messages');
      
      let sessionId = localStorage.getItem('opentoad-session') || 
        (localStorage.setItem('opentoad-session', crypto.randomUUID()), 
         localStorage.getItem('opentoad-session'));
      
      toggle.addEventListener('click', () => {
        chat.classList.toggle('hidden');
        if (!chat.classList.contains('hidden')) input.focus();
      });
      
      function addMessage(content, isUser) {
        const div = document.createElement('div');
        div.className = 'message ' + (isUser ? 'user' : 'assistant');
        div.textContent = content;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }
      
      async function sendMessage() {
        const content = input.value.trim();
        if (!content) return;
        
        input.value = '';
        addMessage(content, true);
        
        try {
          const response = await fetch('/api/webhook', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: content, sessionId })
          });
          const data = await response.json();
          
          if (data.reply) {
            addMessage(data.reply, false);
          }
        } catch (err) {
          addMessage('抱歉，发送失败了。请稍后重试。', false);
        }
      }
      
      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
    })();
  </script>
</body>
</html>
